<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders · ProCabinet (Direction D)</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="assets/_mock.css">
</head>
<body>
<div id="chrome"></div>
<div class="app-body">
  <div class="section-panel active">
    <div class="main-content"><div class="main-scroll">
      <div style="max-width:820px;margin:0 auto">

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
          <h2 style="font-size:18px;font-weight:800;flex:1">Orders</h2>
          <button class="btn btn-primary" style="width:auto">+ New order</button>
        </div>

        <div class="lib-toggle-row" style="margin-bottom:14px">
          <button class="ofilter-tab active">All (3)</button>
          <button class="ofilter-tab">In production (1)</button>
          <button class="ofilter-tab">Ready to fit (1)</button>
          <button class="ofilter-tab">Delivered (1)</button>
        </div>

        <div class="inbox">
          <div class="inbox-list" id="inbox-list"></div>
          <div class="inbox-thread" id="inbox-thread"></div>
        </div>

      </div>
    </div></div>
  </div>
</div>

<div class="mock-ribbon"><span class="dot"></span> Direction D · Thread — Business Orders <a href="index.html">all mockups</a></div>

<script src="assets/_seed.js"></script>
<script>
const M = window.MOCK;
document.getElementById('chrome').outerHTML = M.appChrome('orders', { orders: 3 });
const t = M.computeTotals();

// ── order list (left) ───────────────────────────────────────────────
const ORDERS = [
  { id: 'o31', avatar: 'SW', name: 'Sarah & Tom Whitfield', proj: 'Kitchen — Maple Shaker', num: '#0031',
    last: 'You: doors sprayed 🎨 — photo attached', when: '29 May', badge: 'Production', badgeCls: 'badge-orange', unread: true, active: true },
  { id: 'o30', avatar: 'ML', name: 'Marcus Lee', proj: 'Utility room', num: '#0030',
    last: '“Tuesday fit works great, thank you!”', when: '27 May', badge: 'Ready to fit', badgeCls: 'badge-teal', unread: true },
  { id: 'o29', avatar: 'GP', name: 'Greenfield Practice', proj: 'Reception joinery', num: '#0029',
    last: 'You: all fitted & signed off ✅', when: '14 May', badge: 'Delivered', badgeCls: 'badge-green', unread: false },
];

function listItem(d) {
  return `<div class="inbox-item${d.active ? ' active' : ''}" onclick="selectOrder('${d.id}',this)">
    <div class="inbox-avatar" style="background:var(--accent)">${d.avatar}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-weight:700;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${M.esc(d.name)}</span>
        <span style="font-size:10px;color:var(--muted);flex-shrink:0">${d.when}</span>
      </div>
      <div style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px">${d.num} · ${M.esc(d.proj)}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:5px">
        <span class="badge ${d.badgeCls}" style="font-size:9px">${d.badge}</span>
        <span style="font-size:11px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${M.esc(d.last)}</span>
        ${d.unread ? '<span class="act-dot" style="flex-shrink:0"></span>' : ''}
      </div>
    </div>
  </div>`;
}
document.getElementById('inbox-list').innerHTML = ORDERS.map(listItem).join('');

// ── bubbles ─────────────────────────────────────────────────────────
function bubbleThem(body, time) { return `<div class="bubble them"><div class="bub-body">${body}</div><div class="bub-time">${time}</div></div>`; }
function bubbleMe(body, time) { return `<div class="bubble me"><div class="bub-body">${body}</div><div class="bub-time" style="text-align:right">${time}</div></div>`; }
// update WITH attached photo (maker-side, posted to the customer)
function updateBubble(art, title, body, time) {
  return `<div class="bubble me" style="max-width:84%">
    <div class="bub-body" style="padding:0;overflow:hidden;background:var(--accent)">
      <div class="lphoto" style="width:100%;height:128px;border:0;border-radius:0">${M.art(art)}</div>
      <div style="padding:9px 12px;color:#fff">
        <div style="font-weight:700;font-size:13px;margin-bottom:2px">${title}</div>
        <div style="font-size:12px;opacity:.92;line-height:1.45">${body}</div>
        <div style="font-size:10px;opacity:.8;margin-top:5px">📎 photo · sent to ${M.esc(M.client.first)}</div>
      </div>
    </div>
    <div class="bub-time" style="text-align:right">${time}</div>
  </div>`;
}

// ── Whitfield order thread (the active one) ─────────────────────────
function whitfieldOrder() {
  let html = '';
  html += `<div class="thread-event">Order <strong>#0031</strong> · auto-created from Q-0042 · ${M.fmt(t.total, 2)}</div>`;

  // deposit-paid event + Xero sync chip
  html += `<div class="thread-event"><span class="paid-stamp" style="font-size:11px;border-width:2px;padding:2px 8px">Deposit paid</span> &nbsp;${M.fmt(t.deposit, 2)} · <strong>18 May</strong></div>`;
  html += `<div class="thread-event"><span class="badge badge-green" style="font-size:9px;display:inline-flex;align-items:center;gap:4px">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Synced Xero</span> &nbsp;Invoice INV-0031 · deposit reconciled</div>`;

  html += bubbleMe(`Deposit received Sarah — you're booked in! Kicking off your build now, I'll post photos here at each stage. 🙌`, '18 May');
  html += bubbleThem(`Amazing, thank you! Looking forward to the updates.`, '18 May');

  // template / measurements
  html += `<div class="thread-event">Stage <strong>1 of 4</strong> · Template &amp; measure ✓</div>`;
  html += bubbleMe(`Templated Thursday — measurements confirmed, no changes. Cutting Monday.`, '21 May');

  // frames cut — photo
  html += updateBubble('drawers', 'Frames cut 🪵',
    'All carcasses cut and assembled. Doors to spray next.', '26 May');
  html += `<div class="thread-event">Stage <strong>2 of 4</strong> · Frames ✓</div>`;

  // doors sprayed — photo
  html += updateBubble('base', 'Doors sprayed — Hand-painted Sage 🎨',
    'Two coats on and curing. Handles + hang next, then we wrap for delivery.', '29 May');
  html += `<div class="thread-event">Stage <strong>3 of 4</strong> · Doors &amp; finish ✓</div>`;

  // customer reply
  html += bubbleThem(`That colour is stunning 😍 we're so pleased.`, '29 May');

  // balance reminder you can post + delivery booking
  html += bubbleMe(
    `Thrilled you love it! Nearly there. I'd like to book your <strong>2-day fit for Tue 9 Jun, 8:30 AM</strong>. ` +
    `Balance of <strong>${M.fmt(t.balance, 2)}</strong> is payable any time before — link's on your order page.`,
    '30 May');

  html += `<div class="thread-event">Balance ${M.fmt(t.balance, 2)} · awaiting payment · due before fit</div>`;
  html += `<div id="dyn-o31"></div>`;
  return html;
}

// stub order threads
function stubThread(d, body) {
  let html = `<div class="thread-event">Order ${d.num} · ${M.esc(d.proj)}</div>`;
  if (d.id === 'o30') {
    html += `<div class="thread-event"><span class="paid-stamp" style="font-size:11px;border-width:2px;padding:2px 8px">Deposit paid</span> &nbsp;${M.fmt(1256, 0)} · 18 May</div>`;
    html += `<div class="thread-event"><span class="badge badge-green" style="font-size:9px">✓ Synced Xero</span> &nbsp;INV-0030 reconciled</div>`;
  }
  if (d.id === 'o29') {
    html += `<div class="thread-event"><span class="paid-stamp" style="font-size:11px;border-width:2px;padding:2px 8px">Paid in full</span> &nbsp;${M.fmt(8400, 0)} · 12 May</div>`;
    html += `<div class="thread-event"><span class="badge badge-green" style="font-size:9px">✓ Synced Xero</span> &nbsp;INV-0029 paid &amp; reconciled</div>`;
  }
  body.forEach(b => { html += b.me ? bubbleMe(M.esc(b.t), b.w) : bubbleThem(M.esc(b.t), b.w); });
  html += `<div id="dyn-${d.id}"></div>`;
  return html;
}
const STUBS = {
  o30: [
    { me: true, t: 'Utility units are built and wrapped — ready to fit. When suits for a 1-day install?', w: '27 May' },
    { t: 'Tuesday fit works great, thank you!', w: '27 May' },
    { me: true, t: 'Booked for Tue — see you then. Balance link is on your order page whenever.', w: '27 May' },
  ],
  o29: [
    { me: true, t: 'Reception joinery all fitted and signed off ✅ Pleasure working with you.', w: '14 May' },
    { t: 'Looks superb — the team love it. Thanks so much!', w: '14 May' },
  ],
};

// ── header + composer ───────────────────────────────────────────────
function threadHeader(d) {
  return `<div style="display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--surface)">
    <div class="inbox-avatar" style="background:var(--accent)">${d.avatar}</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:700;font-size:13px">${M.esc(d.name)} · ${d.num}</div>
      <div style="font-size:11px;color:var(--muted)">${M.esc(d.proj)} · <span class="badge ${d.badgeCls}" style="font-size:9px">${d.badge}</span></div>
    </div>
    <a class="btn btn-outline" style="width:auto;font-size:11px;padding:6px 10px" href="d-cust-order.html" target="_blank">View as customer ↗</a>
    <button class="btn btn-success" style="width:auto;font-size:11px;padding:6px 12px" onclick="MOCK.toast('Mock: opens production-update composer')">Post update ▾</button>
  </div>`;
}

function renderThread(d) {
  const body = d.id === 'o31' ? whitfieldOrder() : stubThread(d, STUBS[d.id] || []);
  document.getElementById('inbox-thread').innerHTML =
    threadHeader(d) +
    `<div class="thread" style="flex:1;overflow:auto;padding:14px">${body}</div>` +
    `<div class="composer">
       <button class="btn btn-outline" style="width:auto;font-size:11px;padding:8px 10px" title="Attach build photo" onclick="MOCK.toast('Mock: attach a workshop photo')">📷</button>
       <input id="biz-msg" placeholder="Post an update to ${M.esc(d.name.split(' ')[0])}…" autocomplete="off" onkeydown="if(event.key==='Enter')bizSend('${d.id}')">
       <button class="btn btn-primary" style="width:auto;padding:8px 16px" onclick="bizSend('${d.id}')">Send</button>
     </div>`;
}

window.selectOrder = (id, el) => {
  document.querySelectorAll('#inbox-list .inbox-item').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');
  const dot = el && el.querySelector('.act-dot'); if (dot) dot.remove();
  const d = ORDERS.find(x => x.id === id); if (d) renderThread(d);
};

window.bizSend = id => {
  const inp = document.getElementById('biz-msg'); const v = (inp.value || '').trim();
  if (!v) return; inp.value = '';
  const now = new Date();
  const hh = ((now.getHours() % 12) || 12) + ':' + String(now.getMinutes()).padStart(2, '0') + (now.getHours() < 12 ? ' AM' : ' PM');
  const dyn = document.getElementById('dyn-' + id);
  if (dyn) { dyn.insertAdjacentHTML('beforeend', bubbleMe(M.esc(v), 'You · ' + hh)); dyn.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'end' }); }
  M.toast('Update posted to customer');
};

renderThread(ORDERS[0]);
</script>
<style>
.td { display:inline-block; animation: tdpulse 1.1s infinite; }
@keyframes tdpulse { 0%,100%{opacity:.3} 50%{opacity:1} }
.inbox { height: 600px; }
.inbox-thread { overflow: hidden; }
</style>
</body>
</html>
