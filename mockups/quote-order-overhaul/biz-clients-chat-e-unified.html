<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clients · ProCabinet (Option E · unified card)</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="assets/_mock.css">
<style>
  /* Option E — ONE rich client card, reused in BOTH Clients and Messages views.
     Only the filter/sort/expanded-state differ; the card markup is identical. */
  .seg-count { background: var(--accent); color: #fff; font-size: 10px; font-weight: 800; min-width: 17px; height: 17px; padding: 0 5px; border-radius: 9px; display: inline-flex; align-items: center; justify-content: center; margin-left: 6px; }
  .view { display: none; } .view.active { display: block; }

  /* conversation chip lives in the card header — toggles the inline thread */
  .chat-chip { font-size: 11px; font-weight: 600; padding: 5px 11px; border-radius: 999px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; transition: all .15s; white-space: nowrap; }
  .chat-chip:hover { border-color: var(--accent); color: var(--accent); }
  .chat-chip.needs { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chat-chip.replied { color: var(--success); border-color: var(--border); }
  .chat-chip svg { color: inherit; }

  .cc-row { font-size: 11.5px; padding: 4px 6px; border-radius: 4px; display: flex; align-items: center; flex-wrap: wrap; }

  /* the inline conversation panel inside every card (collapsed by default) */
  .cc-convo { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border2); }
  .client-card.convo-open .cc-convo { display: block; }
  .client-card.convo-open { border-color: var(--accent) !important; box-shadow: var(--shadow-md) !important; }
  .cc-convo .thread { max-height: 280px; overflow: auto; padding: 4px 2px 10px; }
  .cc-convo .composer { border: 1px solid var(--border); border-radius: 10px; background: var(--surface); padding: 8px 10px; }

  /* state pill on the footer row */
  .state-pill { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 999px; display: inline-flex; align-items: center; gap: 5px; }
  .state-pill.needs { background: var(--accent); color: #fff; }
  .state-pill.replied { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .state-pill.lead { background: rgba(232,168,56,.16); color: var(--accent); }
  .state-pill .sp-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; }
</style>
</head>
<body>
<div id="chrome"></div>
<div class="app-body">
  <div class="section-panel active">

    <!-- REAL CLIENTS SIDEBAR (New Client form) -->
    <div class="sidebar mv-pane-editor" id="clients-sidebar" style="width:300px;min-width:260px">
      <div class="sidebar-scroll">
        <div class="form-section">
          <div class="project-header">
            <div class="ph-row1">
              <svg class="ph-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              <span class="ph-title">New Client</span>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:8px"><label>Name</label><input type="text" placeholder="e.g. John Smith"></div>
          <div class="form-group" style="margin-bottom:8px"><label>Email</label><input type="email" placeholder="john@example.com"></div>
          <div class="form-group" style="margin-bottom:8px"><label>Phone</label><input type="tel" placeholder="+44 7700 900000"></div>
          <div class="form-group" style="margin-bottom:8px"><label>Address</label><textarea placeholder="Street, City..."></textarea></div>
          <div class="form-group" style="margin-bottom:8px"><label>Notes</label><textarea placeholder="Any notes..."></textarea></div>
          <button class="btn btn-primary" style="margin-top:4px;width:100%">+ Add Client</button>
        </div>
      </div>
    </div>
    <div class="resize-handle"></div>

    <!-- MAIN -->
    <div class="main-content mv-pane-list">
      <div class="main-scroll" id="clients-main"></div>
    </div>
  </div>
</div>

<div class="mock-ribbon"><span class="dot"></span> App · Clients tab — Option E · Messages reuses the client card <a href="index.html">all mockups</a></div>

<script src="assets/_seed.js"></script>
<script>
const M = window.MOCK;
const C = M.contacts;
const fmt = v => '£' + Number(v).toLocaleString('en-GB', { maximumFractionDigits: 0 });

// Per-client quotes/orders + email/phone (copied verbatim from the real Clients tab base)
const DEALS = {
  c1: { email: 'sarah.whitfield@gmail.com', phone: '07700 900 042', quotes: [{ label: 'Q-0042 · Kitchen — Maple Shaker', status: 'Viewed', badge: 'badge-blue', value: 7982.40 }], orders: [] },
  c2: { email: 'marcus.lee@outlook.com', phone: '07700 900 118', quotes: [], orders: [{ label: 'Order 0029 · Utility room', status: 'Deposit paid', badge: 'badge-green', value: 3140 }] },
  c3: { email: 'estate@theoldrectory.co.uk', phone: '01453 555 071', quotes: [{ label: 'Q-0040 · Boot room + bench', status: 'Accepted', badge: 'badge-teal', value: 5620 }], orders: [] },
  c4: { email: 'j.okafor@gmail.com', phone: '07700 900 239', quotes: [{ label: 'Q-0039 · Alcove units ×2', status: 'Sent', badge: 'badge-blue', value: 1880 }, { label: 'Q-0035 · Bookcase', status: 'Draft', badge: 'badge-gray', value: 640 }], orders: [] },
  c5: { email: 'priya.sam@gmail.com', phone: '07700 900 285', quotes: [], orders: [] },
};

document.getElementById('chrome').outerHTML = M.appChrome('clients', { orders: 3 });

// ── runtime state per contact (ONE source of truth, shared by both views) ──
// open: whether the inline conversation is expanded for THIS client right now.
// Persisting it here is what keeps a card consistent if you flip views.
const state = {};
C.forEach(c => { state[c.id] = { needs: c.who === 'them', replied: false, unread: c.unread || 0, open: false }; });
function totalUnread() { return C.reduce((n, c) => n + (state[c.id].unread || 0), 0); }
// every contact has a conversation in this mock; kept explicit for the Messages filter
function hasConvo(c) { return true; }

const CHAT_ICON = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>';

function firstName(name) { const t = name.split(/[ &]/)[0]; return t === 'The' ? name : t; }
function baseUnread(c) { return c.id === 'c1' ? 4 : 2; } // total message count badge when nothing's unread

// ── shell (content header + filter + segment + the two views) ──────────
function shell() {
  return `<div style="padding:24px;max-width:900px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <h2 style="font-size:18px;font-weight:800;flex:1">Clients</h2>
      <button class="btn btn-primary" style="width:auto">+ New client</button>
    </div>
    <div class="lib-filter-row">
      <input type="text" class="lib-filter-input" placeholder="Search clients...">
      <button class="btn btn-outline lib-filter-btn">&darr; Export</button>
      <button class="btn btn-outline lib-filter-btn">&uarr; Import</button>
    </div>
    <div class="lib-toggle-row" style="justify-content:space-between">
      <div class="seg" id="view-seg" role="group" aria-label="View">
        <button class="seg-opt active" data-view="clients" onclick="setView('clients')">Clients</button>
        <button class="seg-opt" data-view="messages" onclick="setView('messages')">Messages<span class="seg-count" id="seg-unread"></span></button>
      </div>
      <select class="lib-sort-select"><option>Sort by name</option><option>Sort by value</option><option>Needs reply first</option></select>
    </div>
    <div class="view active" id="view-clients"><div id="clients-cards"></div></div>
    <div class="view" id="view-messages">
      <div class="feed-filters" id="msg-filters" style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap"></div>
      <div id="messages-cards"></div>
    </div>
  </div>`;
}

// ── THE shared component: ONE real client card, optionally expanded ────
//   view  — 'clients' | 'messages' (drives the DOM id prefix so the same
//           client can appear once per view without id collisions)
//   expanded — force the conversation open inline (Messages view)
function clientCard(c, view, expanded) {
  const d = DEALS[c.id] || { quotes: [], orders: [] };
  const s = state[c.id];
  const open = expanded || s.open;
  const totalValue = d.quotes.reduce((a, q) => a + q.value, 0) + d.orders.reduce((a, o) => a + o.value, 0);

  const section = (label, items) => items.length
    ? `<div class="cc-section" style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--border2)">
        <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">${label} (${items.length})</div>
        ${items.map(it => `<div class="cc-row"><span>${M.esc(it.label)} · ${fmt(it.value)}</span><span class="badge ${it.badge}" style="font-size:9px;padding:1px 6px;margin-left:6px">${it.status}</span></div>`).join('')}
      </div>` : '';

  const metaBits = [d.email, d.quotes.length + ' quote' + (d.quotes.length !== 1 ? 's' : ''), d.orders.length + ' order' + (d.orders.length !== 1 ? 's' : ''), fmt(totalValue)].join(' · ');

  // header chip = conversation state at a glance + the expand/collapse control
  let chip;
  if (s.unread) chip = `<div class="chat-chip needs">${CHAT_ICON} ${s.unread} unread · reply</div>`;
  else if (s.needs) chip = `<div class="chat-chip needs">${CHAT_ICON} Needs reply</div>`;
  else if (s.replied) chip = `<div class="chat-chip replied">${CHAT_ICON} ✓ Replied</div>`;
  else chip = `<div class="chat-chip">${CHAT_ICON} ${baseUnread(c)}</div>`;

  const threadId = 'thread-' + view + '-' + c.id;
  const inputId = 'input-' + view + '-' + c.id;

  return `<div class="client-card${open ? ' convo-open' : ''}" id="card-${view}-${c.id}" data-id="${c.id}"
      style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;transition:box-shadow .15s,border-color .15s">
    <div style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="toggleConvo('${c.id}')">
      <div style="width:30px;height:30px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0">${c.name.charAt(0).toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:700;color:var(--text)">${M.esc(c.name)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:1px">${M.esc(metaBits)}</div>
      </div>
      ${chip}
    </div>
    ${section('Quotes', d.quotes)}
    ${section('Orders', d.orders)}
    ${(!d.quotes.length && !d.orders.length) ? `<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--border2);font-size:11px;color:var(--muted)">New lead · no quote yet — <span style="color:var(--accent2);font-weight:600">${M.esc(c.last.replace(/^You:\s*/, ''))}</span></div>` : ''}

    <!-- INLINE conversation: present in EVERY card, shown when .convo-open -->
    <div class="cc-convo">
      <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:6px">${CHAT_ICON} Conversation</div>
      <div class="thread" id="${threadId}">${M.threadFor(c)}</div>
      <div class="composer">
        <input id="${inputId}" placeholder="Reply to ${M.esc(firstName(c.name))}…" autocomplete="off" onkeydown="if(event.key==='Enter')doReply('${c.id}','${view}')">
        <button class="btn btn-primary" style="width:auto;padding:8px 16px" onclick="doReply('${c.id}','${view}')">Send</button>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border2)">
      ${statePill(c)}
      <button class="btn btn-outline" style="font-size:11px;padding:4px 10px;width:auto;margin-left:auto" onclick="event.stopPropagation();toggleConvo('${c.id}',true)">${CHAT_ICON.replace('width="13" height="13"','width="11" height="11"')} ${open ? 'Hide chat' : 'Message'}</button>
      <button class="btn btn-outline" style="font-size:11px;padding:4px 8px;width:auto">Duplicate</button>
      <button class="btn btn-outline" style="color:var(--danger);font-size:11px;padding:4px 8px;width:auto">Delete</button>
    </div>
  </div>`;
}

function statePill(c) {
  const s = state[c.id];
  if (s.unread || s.needs) return '<span class="state-pill needs"><span class="sp-dot"></span>Needs reply</span>';
  if (s.replied) return '<span class="state-pill replied">✓ Replied</span>';
  if (c.status === 'Lead') return '<span class="state-pill lead">New lead</span>';
  return '<span class="state-pill replied">✓ Replied</span>';
}

// ── CLIENTS view: all clients, conversation collapsed (chip shows unread) ──
function renderClientsView() {
  document.getElementById('clients-cards').innerHTML = C.map(c => clientCard(c, 'clients', false)).join('');
}

// ── MESSAGES view: SAME card, filtered to conversations, sorted needs-first, expanded ──
let activeFilter = 'all';
function needsCount() { return C.filter(c => state[c.id].needs || state[c.id].unread).length; }
function leadsCount() { return C.filter(c => c.status === 'Lead').length; }
function renderFilters() {
  const convoN = C.filter(hasConvo).length;
  const tabs = [['all', 'All', convoN], ['needs', 'Needs reply', needsCount()], ['leads', 'Leads', leadsCount()]];
  document.getElementById('msg-filters').innerHTML = tabs.map(([k, label, n]) => `<button class="ofilter-tab${k === activeFilter ? ' active' : ''}" onclick="setFilter('${k}')">${label} (${n})</button>`).join('');
}
window.setFilter = k => { activeFilter = k; renderFilters(); renderMessagesView(); };
function passesFilter(c) {
  if (activeFilter === 'needs') return state[c.id].needs || state[c.id].unread;
  if (activeFilter === 'leads') return c.status === 'Lead';
  return true;
}
function sortNeedsFirst(a, b) {
  const an = (state[a.id].needs || state[a.id].unread) ? 0 : 1;
  const bn = (state[b.id].needs || state[b.id].unread) ? 0 : 1;
  if (an !== bn) return an - bn;
  return C.indexOf(a) - C.indexOf(b);
}
function renderMessagesView() {
  const list = C.filter(hasConvo).filter(passesFilter).slice().sort(sortNeedsFirst);
  const host = document.getElementById('messages-cards');
  // identical card markup — only difference is expanded=true + the sort/filter above
  host.innerHTML = list.length
    ? list.map(c => clientCard(c, 'messages', true)).join('')
    : `<div class="card" style="padding:28px;text-align:center;color:var(--muted);font-size:13px">You're all caught up. 🎉</div>`;
  // scroll each freshly-rendered thread to the latest message
  list.forEach(c => { const th = document.getElementById('thread-messages-' + c.id); if (th) th.scrollTop = th.scrollHeight; });
}

// ── interactions ───────────────────────────────────────────────────────
// toggle the inline conversation; in Messages view cards are already expanded,
// so the chip/Message button there just scrolls to the composer.
window.toggleConvo = (id, focus) => {
  const inMessages = document.getElementById('view-messages').classList.contains('active');
  const view = inMessages ? 'messages' : 'clients';
  const s = state[id];
  if (!inMessages) s.open = !s.open;            // Messages cards stay open by design
  const card = document.getElementById('card-' + view + '-' + id);
  if (!card) return;
  const open = inMessages ? true : s.open;
  card.classList.toggle('convo-open', open);
  // clear unread when the conversation is shown — sync the chip (both views) + badge
  if (open && s.unread) { s.unread = 0; syncCard(id); refreshBadges(); }
  // keep the footer "Message / Hide chat" label honest in the Clients view
  if (!inMessages) {
    const btn = card.querySelector('div[style*="border-top:1px solid var(--border2)"] .btn-outline');
    if (btn) btn.innerHTML = CHAT_ICON.replace('width="13" height="13"','width="11" height="11"') + (open ? ' Hide chat' : ' Message');
  }
  if (open) {
    const th = document.getElementById('thread-' + view + '-' + id); if (th) th.scrollTop = th.scrollHeight;
    if (focus) { const inp = document.getElementById('input-' + view + '-' + id); if (inp) setTimeout(() => inp.focus(), 60); }
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
};

// send a reply from whichever view's composer: flips to ✓ Replied, clears unread,
// updates the Messages count badge, and keeps BOTH views' copies of the card in sync.
window.doReply = (id, view) => {
  const inputId = 'input-' + view + '-' + id, threadId = 'thread-' + view + '-' + id;
  const inp = document.getElementById(inputId);
  if (!inp || !inp.value.trim()) return;
  const c = C.find(x => x.id === id);
  M.chat.send(inputId, threadId, cannedReply(c));
  state[id].needs = false; state[id].unread = 0; state[id].replied = true;
  syncCard(id);
  refreshBadges();
  renderFilters();
  M.toast('Reply sent to ' + firstName(c.name));
};

// re-render whichever view-instances of this card exist so chip + state pill stay consistent
function syncCard(id) {
  ['clients', 'messages'].forEach(view => {
    const card = document.getElementById('card-' + view + '-' + id);
    if (!card) return;
    const c = C.find(x => x.id === id);
    // update the header chip
    const chip = card.querySelector('.chat-chip');
    if (chip) chip.outerHTML = chipFor(c);
    // update the footer state pill
    const pill = card.querySelector('.state-pill');
    if (pill) pill.outerHTML = statePill(c);
  });
}
function chipFor(c) {
  const s = state[c.id];
  if (s.unread) return `<div class="chat-chip needs">${CHAT_ICON} ${s.unread} unread · reply</div>`;
  if (s.needs) return `<div class="chat-chip needs">${CHAT_ICON} Needs reply</div>`;
  if (s.replied) return `<div class="chat-chip replied">${CHAT_ICON} ✓ Replied</div>`;
  return `<div class="chat-chip">${CHAT_ICON} ${baseUnread(c)}</div>`;
}

function cannedReply(c) {
  return ({
    c1: 'Lovely — no rush on the island at all. The quote stays live and reprices the moment you decide 👍',
    c2: 'Brilliant, thanks Marcus! Your order’s in the build queue — I’ll send dates this week.',
    c3: 'Perfect — I’ll send the deposit link now so we can lock in your slot.',
    c4: 'No problem — happy to walk through the alcove sizes whenever suits.',
    c5: 'Hi! Yes, I’d love to quote your walk-in wardrobe — could you send a rough width and a photo of the space?',
  })[c.id] || 'Thanks — I’ll get back to you shortly 👍';
}

// ── shared ─────────────────────────────────────────────────────────────
function refreshBadges() {
  const n = totalUnread();
  const b = document.getElementById('seg-unread');
  b.textContent = n; b.style.display = n ? '' : 'none';
}
window.setView = v => {
  document.querySelectorAll('#view-seg .seg-opt').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  document.getElementById('view-clients').classList.toggle('active', v === 'clients');
  document.getElementById('view-messages').classList.toggle('active', v === 'messages');
  if (v === 'clients') renderClientsView();
  else { renderFilters(); renderMessagesView(); }
};

// ── init ───────────────────────────────────────────────────────────────
document.getElementById('clients-main').innerHTML = shell();
renderClientsView();
renderFilters();
renderMessagesView();
refreshBadges();
</script>
</body>
</html>
