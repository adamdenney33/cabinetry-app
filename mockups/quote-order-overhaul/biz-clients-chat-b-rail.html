<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clients · ProCabinet (Chat — Option B · List + rail)</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="assets/_mock.css">
<style>
  /* ── Option B — familiar Clients tab cards + a persistent conversation rail ── */
  .clients-grid { display: flex; flex-direction: column; gap: 12px; }

  /* client card (mirrors the real Clients-tab card conventions) */
  .cl-card { cursor: pointer; transition: box-shadow .15s, border-color .15s; }
  .cl-card:hover { box-shadow: var(--shadow-md); border-color: var(--accent-dim); }
  .cl-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow-md); }
  .cl-card .card-body { display: flex; gap: 12px; align-items: flex-start; }
  .cl-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent2); color: #fff; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cl-main { flex: 1; min-width: 0; }
  .cl-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .cl-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .cl-proj { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .cl-proj .ref { color: var(--text2); font-weight: 600; }
  .cl-last { font-size: 12px; color: var(--text2); margin-top: 7px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .cl-last .who { color: var(--muted); }
  .cl-right { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .cl-value { font-size: 16px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; }
  .cl-actions { display: flex; align-items: center; gap: 6px; margin-top: 11px; flex-wrap: wrap; }
  .cl-actions .btn { width: auto; font-size: 11px; padding: 6px 10px; }
  .cl-msg-btn { display: inline-flex; align-items: center; gap: 6px; position: relative; }
  .unread-chip { background: var(--danger); color: #fff; font-size: 10px; font-weight: 800; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; }

  /* right rail — sticky conversation panel */
  .rail-convo { position: sticky; top: 16px; align-self: start; }
  .convo-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; height: 640px; }
  .convo-head { padding: 11px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .convo-head .cl-avatar { width: 36px; height: 36px; font-size: 13px; }
  .convo-head .ch-name { font-weight: 700; font-size: 13px; line-height: 1.15; }
  .convo-head .ch-meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .convo-thread { flex: 1; overflow: auto; padding: 14px; background: var(--bg); }
  .convo-ctx { flex-shrink: 0; border-top: 1px solid var(--border); background: var(--surface2); padding: 9px 14px; display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .convo-ctx .ctx-lbl { color: var(--muted); }
  .convo-ctx .ctx-val { font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
  .convo-ctx .btn { width: auto; font-size: 11px; padding: 5px 9px; margin-left: auto; }
  .convo-panel .composer { flex-shrink: 0; }

  /* td blink for "is typing/viewing" */
  .td { display:inline-block; animation: tdpulse 1.1s infinite; }
  @keyframes tdpulse { 0%,100%{opacity:.3} 50%{opacity:1} }

  @media (max-width: 720px) {
    .rail-convo { position: static; margin-top: 14px; }
    .convo-panel { height: 540px; }
  }
</style>
</head>
<body>
<div id="chrome"></div>
<div class="app-body">
  <div class="section-panel active">
    <div class="main-content"><div class="main-scroll">
      <div style="max-width:1080px;margin:0 auto">

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <h2 style="font-size:18px;font-weight:800;flex:1">Clients</h2>
          <button class="btn btn-primary" style="width:auto">+ New client</button>
        </div>

        <div class="lib-filter-row">
          <input class="lib-filter-input" type="search" placeholder="Search client or project…">
          <button class="btn btn-outline lib-filter-btn">&darr; Export</button>
        </div>
        <div class="lib-toggle-row" style="margin-bottom:14px">
          <button class="ofilter-tab active">All (5)</button>
          <button class="ofilter-tab">Unread (3)</button>
          <button class="ofilter-tab">Open quotes (3)</button>
          <button class="ofilter-tab">Orders (1)</button>
          <button class="ofilter-tab">Leads (1)</button>
        </div>

        <!-- list + persistent conversation rail -->
        <div class="two-pane rail-right">
          <div class="clients-grid" id="clients-grid"></div>

          <div class="rail-convo">
            <div class="convo-panel" id="convo-panel"></div>
          </div>
        </div>

      </div>
    </div></div>
  </div>
</div>

<div class="mock-ribbon"><span class="dot"></span> App · Clients tab chat — Option B · List + conversation rail <a href="index.html">all mockups</a></div>

<script src="assets/_seed.js"></script>
<script>
const M = window.MOCK;
document.getElementById('chrome').outerHTML = M.appChrome('clients', { orders: 3 });

const CONTACTS = M.contacts;
let activeId = 'c1';

// ── LEFT: client cards (familiar Clients-tab card layout) ────────────
function valueLine(c) {
  if (c.value > 0) return `<div class="cl-value">${M.fmt(c.value, 0)}</div>`;
  return `<div class="cl-value" style="font-size:12px;color:var(--muted);font-weight:700">No quote yet</div>`;
}
function lastLine(c) {
  const who = c.who === 'me' ? '<span class="who">You:</span> ' : '';
  const text = c.last.replace(/^You:\s*/, '');
  return `${who}${M.esc(text)}`;
}
function clientCard(c) {
  const sel = c.id === activeId ? ' selected' : '';
  const isOrder = /Order/i.test(c.ref);
  return `<div class="card cl-card${sel}" id="card-${c.id}" onclick="selectClient('${c.id}')">
    <div class="card-body">
      <div class="cl-avatar">${c.initials}</div>
      <div class="cl-main">
        <div class="cl-name-row">
          <span class="cl-name">${M.esc(c.name)}</span>
          <span class="badge ${c.badge}" style="font-size:9px">${c.status}</span>
        </div>
        <div class="cl-proj">${M.esc(c.project)} · <span class="ref">${M.esc(c.ref)}</span></div>
        <div class="cl-last">${lastLine(c)} <span style="color:var(--muted)">· ${c.time}</span></div>
        <div class="cl-actions" onclick="event.stopPropagation()">
          ${c.value > 0
            ? `<button class="btn btn-outline" onclick="M.toast('Mock: opens ${isOrder ? 'order' : 'quote'} ${M.esc(c.ref)}')">${isOrder ? 'Open order' : 'Open quote'} &#8599;</button>`
            : `<button class="btn btn-outline" onclick="M.toast('Mock: start a quote for ${M.esc(c.name)}')">+ New quote</button>`}
          ${c.value > 0 ? `<button class="btn btn-outline" onclick="M.toast('Mock: new quote for ${M.esc(c.name)}')">New quote</button>` : ''}
          <button class="btn btn-primary cl-msg-btn" onclick="selectClient('${c.id}')">
            <span aria-hidden="true">&#128172;</span> Message
            ${c.unread > 0 ? `<span class="unread-chip" id="chip-${c.id}">${c.unread}</span>` : ''}
          </button>
        </div>
      </div>
      <div class="cl-right">
        ${valueLine(c)}
        ${c.unread > 0 ? `<span class="act-dot" id="dot-${c.id}" title="${c.unread} unread"></span>` : ''}
      </div>
    </div>
  </div>`;
}
function renderList() {
  document.getElementById('clients-grid').innerHTML = CONTACTS.map(clientCard).join('');
}

// ── RIGHT: sticky conversation rail ──────────────────────────────────
function statusFootnote(c) {
  if (c.who === 'them' && c.unread > 0) return `<span class="act-dot"></span> ${c.unread} new message${c.unread > 1 ? 's' : ''}`;
  if (c.id === 'c1') return `<span class="act-dot"></span> viewing the quote<span class="td">…</span>`;
  return `last reply ${c.time}`;
}
function ctxBlock(c) {
  const isOrder = /Order/i.test(c.ref);
  if (c.value > 0) {
    return `<span class="ctx-lbl">${isOrder ? '' : 'Open quote '}${M.esc(c.ref)}</span>
      <span class="ctx-val">${M.fmt(c.value, 0)}</span>
      <button class="btn btn-outline" onclick="M.toast('Mock: opens ${isOrder ? 'order' : 'quote'} ${M.esc(c.ref)}')">Open ${isOrder ? 'order' : 'quote'} &#8599;</button>`;
  }
  return `<span class="ctx-lbl">New lead · no quote yet</span>
    <button class="btn btn-primary" onclick="M.toast('Mock: start a quote for ${M.esc(c.name)}')" style="margin-left:auto;width:auto;font-size:11px;padding:5px 9px">+ Start a quote</button>`;
}
function renderRail(c) {
  const panel = document.getElementById('convo-panel');
  panel.innerHTML =
    `<div class="convo-head">
       <div class="cl-avatar">${c.initials}</div>
       <div style="flex:1;min-width:0">
         <div class="ch-name">${M.esc(c.name)}</div>
         <div class="ch-meta">
           <span class="badge ${c.badge}" style="font-size:9px">${c.status}</span>
           ${c.value > 0 ? `· <span style="font-weight:700;color:var(--text2)">${M.fmt(c.value, 0)}</span>` : ''}
         </div>
       </div>
       <button class="btn btn-outline" style="width:auto;font-size:11px;padding:6px 9px" onclick="M.toast('Mock: opens ${M.esc(c.name)} client record')" title="Client details">&#9432;</button>
     </div>` +
    `<div class="thread convo-thread" id="active-thread">${M.threadFor(c)}</div>` +
    `<div class="composer">
       <input id="rail-msg" placeholder="Message ${M.esc(c.name.split(' ')[0].replace('&', '').trim() || c.name)}…" autocomplete="off" onkeydown="if(event.key==='Enter')railSend()">
       <button class="btn btn-outline" style="width:auto;font-size:11px;padding:8px 10px" title="Attach photo">&#128206;</button>
       <button class="btn btn-primary" style="width:auto;padding:8px 16px" onclick="railSend()">Send</button>
     </div>` +
    `<div class="convo-ctx">${ctxBlock(c)}</div>`;
  // autoscroll thread to newest
  const th = document.getElementById('active-thread');
  th.scrollTop = th.scrollHeight;
}

// ── selection ────────────────────────────────────────────────────────
window.selectClient = (id) => {
  activeId = id;
  const c = CONTACTS.find(x => x.id === id);
  if (!c) return;
  // clear unread indicators on open (visual only)
  c.unread = 0;
  const chip = document.getElementById('chip-' + id); if (chip) chip.remove();
  const dot = document.getElementById('dot-' + id); if (dot) dot.remove();
  // highlight selected card
  document.querySelectorAll('.cl-card').forEach(el => el.classList.remove('selected'));
  const card = document.getElementById('card-' + id); if (card) card.classList.add('selected');
  renderRail(c);
};

// ── composer: appends a 'me' bubble + canned reply, autoscrolls #active-thread ──
const REPLIES = {
  c1: 'Of course — happy to talk it through. The oak island looks stunning in the flesh, but painted-to-match works beautifully too. No rush at all 👍',
  c2: 'Brilliant, thank you Marcus! Anything you need before the fit, just shout.',
  c3: 'Perfect — no hurry at all. I\'ll hold your production slot once the deposit lands. Thanks!',
  c4: 'No problem — take your time. Happy to tweak anything on the quote if it helps.',
  c5: 'Absolutely! I\'d love to. Could you send a rough width/height and a photo of the space? I\'ll get a quote over to you.',
};
window.railSend = () => {
  M.chat.send('rail-msg', 'active-thread', REPLIES[activeId]);
};

// ── init: list + default selected = Sarah (c1) ───────────────────────
renderList();
renderRail(CONTACTS.find(c => c.id === activeId));
// reflect the cleared unread on the default-open card
(function () { const c = CONTACTS.find(x => x.id === activeId); if (c) c.unread = 0; renderList(); })();
</script>
</body>
</html>
