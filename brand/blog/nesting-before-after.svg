<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <pattern id="waste" width="12" height="12" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#f6e3c0"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#e8a838" stroke-width="3"/>
    </pattern>
  </defs>
  <rect width="1200" height="640" fill="#ffffff"/>

  <!-- Left: cut by eye -->
  <text x="70" y="72" font-size="26" font-weight="700" fill="#111111">Cut by eye</text>
  <text x="70" y="100" font-size="17" fill="#5b5b5b">around 65% of the sheet ends up in parts</text>
  <!-- sheet: waste pattern shows through the gaps -->
  <g stroke="#111111" stroke-width="2">
    <rect x="70" y="130" width="500" height="250" fill="url(#waste)"/>
    <!-- loosely scattered parts -->
    <rect x="82"  y="142" width="150" height="92"  fill="#ffffff"/>
    <rect x="252" y="142" width="120" height="70"  fill="#ececec"/>
    <rect x="82"  y="252" width="110" height="106" fill="#ececec"/>
    <rect x="212" y="240" width="150" height="80"  fill="#ffffff"/>
    <rect x="392" y="150" width="90"  height="120" fill="#ffffff"/>
    <rect x="230" y="332" width="96"  height="36"  fill="#ffffff"/>
  </g>
  <text x="70" y="416" font-size="18" fill="#111111" font-weight="600">11 sheets for the job</text>

  <!-- Right: nested -->
  <text x="630" y="72" font-size="26" font-weight="700" fill="#111111">Nested by software</text>
  <text x="630" y="100" font-size="17" fill="#5b5b5b">the same parts at 80% yield or better</text>
  <g stroke="#111111" stroke-width="2">
    <rect x="630" y="130" width="500" height="250" fill="url(#waste)"/>
    <!-- tightly packed parts, thin kerf gaps -->
    <rect x="638" y="138" width="150" height="92"  fill="#ffffff"/>
    <rect x="792" y="138" width="150" height="92"  fill="#ececec"/>
    <rect x="946" y="138" width="120" height="92"  fill="#ffffff"/>
    <rect x="638" y="234" width="110" height="138" fill="#ececec"/>
    <rect x="752" y="234" width="150" height="80"  fill="#ffffff"/>
    <rect x="906" y="234" width="150" height="80"  fill="#ececec"/>
    <rect x="752" y="318" width="96"  height="54"  fill="#ffffff"/>
    <rect x="852" y="318" width="120" height="54"  fill="#ffffff"/>
  </g>
  <text x="630" y="416" font-size="18" fill="#111111" font-weight="600">9 sheets for the same parts</text>

  <!-- Legend + takeaway -->
  <rect x="70" y="470" width="26" height="26" fill="url(#waste)" stroke="#111111" stroke-width="2"/>
  <text x="108" y="489" font-size="17" fill="#5b5b5b">offcut and waste you paid full price for</text>
  <line x1="70" y1="530" x2="1130" y2="530" stroke="#e2e2e2" stroke-width="2"/>
  <text x="70" y="580" font-size="20" fill="#111111">Two sheets saved on one job. At £48 a sheet, that gap is what nesting is worth.</text>
</svg>
