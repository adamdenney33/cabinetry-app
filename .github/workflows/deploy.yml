name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Force the bundled JS in actions/checkout, actions/setup-node, and
# cloudflare/wrangler-action to run on the runner's Node 24 instead
# of the bundled Node 20. GitHub will flip this default on
# 2026-06-02; opting in early surfaces any incompatibility now.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # 'lts/*' tracks the current Node LTS automatically — Node 22
          # today, becomes Node 24 in October 2025, etc. Avoids the
          # need to manually bump major versions ahead of GitHub's
          # action-runtime deprecation deadlines (which retire old
          # Node majors every ~12 months).
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Publishable Supabase keys — safe for client-side exposure (RLS
          # enforces access). Same values as .env.local. Vite inlines these
          # at build time via import.meta.env.
          VITE_SUPABASE_URL: https://mhzneruvlfmhnsohfrdo.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_4lHAEgWPQz8DX8TH2KnuiA_oimj8J__
          # Sentry error tracking (PLAN.md P.3). Uncomment + fill once the
          # Sentry project exists. VITE_SENTRY_DSN is publishable — plaintext
          # is fine, like the keys above; while commented out, Sentry stays
          # disabled and @sentry/vite-plugin no-ops. SENTRY_AUTH_TOKEN must be
          # added as a GitHub Actions repository secret. ORG/PROJECT are slugs.
          VITE_SENTRY_DSN: https://535a9c90da9f4467e912d173636ff597@o4511394076426240.ingest.de.sentry.io/4511394099626064
          SENTRY_ORG: pro-desktop
          SENTRY_PROJECT: javascript
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # PostHog product analytics (PLAN.md C.5). Publishable key — plaintext is fine.
          VITE_POSTHOG_KEY: phc_swdug9tQJqTUR4HD8C7FKTtW2NDKJnkd8V8QA2JkxAuG
          VITE_POSTHOG_HOST: https://eu.i.posthog.com

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cabinetry-app --branch=main
