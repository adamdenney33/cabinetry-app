name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # PINNED — do NOT use a moving target like 'lts/*' here. The build
          # output (Rollup chunk ordering) is Node-version-sensitive: when
          # 'lts/*' silently rolled to a newer Node, the vendor bundle picked up
          # a cross-chunk TDZ ("Cannot access '_sb' before initialization") that
          # broke the live app on the next rebuild — even though the source was
          # unchanged. This exact version is verified to produce a clean,
          # loadable production build (built + smoke-loaded locally). Bump it
          # only deliberately, after re-verifying the built output boots.
          node-version: '25.8.2'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Smoke gate: boot the app in a headless browser and verify it loads, every
      # classic script is served, the login screen works, AND (logged in via a
      # dedicated test account) every main screen + the quote/order editors render
      # without throwing. If any of this breaks, the deploy is blocked before it
      # reaches customers. The logged-in tests sign into a throwaway test account
      # (NOT a customer/personal one) and are read-only — they never write or pay.
      # TEST_EMAIL/TEST_PASSWORD are GitHub Actions secrets; without them the
      # logged-in tests auto-skip (tests/e2e/smoke.app.spec.js).
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npm run test:e2e
        env:
          # The dev server the tests boot needs these to start. Same publishable
          # values as the Build step below — safe for client exposure (RLS).
          VITE_SUPABASE_URL: https://mhzneruvlfmhnsohfrdo.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_4lHAEgWPQz8DX8TH2KnuiA_oimj8J__
          # Dedicated read-only test account — enables the logged-in render tests.
          VITE_TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          VITE_TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Build
        run: npm run build
        env:
          # Publishable Supabase keys — safe for client-side exposure (RLS
          # enforces access). Same values as .env.local. Vite inlines these
          # at build time via import.meta.env.
          VITE_SUPABASE_URL: https://mhzneruvlfmhnsohfrdo.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_4lHAEgWPQz8DX8TH2KnuiA_oimj8J__
          # Sentry error tracking (PLAN.md P.3). Uncomment + fill once the
          # Sentry project exists. VITE_SENTRY_DSN is publishable — plaintext
          # is fine, like the keys above; while commented out, Sentry stays
          # disabled and @sentry/vite-plugin no-ops. SENTRY_AUTH_TOKEN must be
          # added as a GitHub Actions repository secret. ORG/PROJECT are slugs.
          VITE_SENTRY_DSN: https://535a9c90da9f4467e912d173636ff597@o4511394076426240.ingest.de.sentry.io/4511394099626064
          SENTRY_ORG: pro-desktop
          SENTRY_PROJECT: javascript
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # PostHog product analytics (PLAN.md C.5). Publishable key — plaintext is fine.
          VITE_POSTHOG_KEY: phc_swdug9tQJqTUR4HD8C7FKTtW2NDKJnkd8V8QA2JkxAuG
          VITE_POSTHOG_HOST: https://eu.i.posthog.com

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cabinetry-app --branch=main
