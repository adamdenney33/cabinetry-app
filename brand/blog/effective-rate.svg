<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect width="1200" height="640" fill="#ffffff"/>
  <text x="70" y="64" font-size="26" font-weight="700" fill="#111111">What I believed against what three jobs paid</text>
  <text x="70" y="94" font-size="17" fill="#5b5b5b">price minus materials, divided by real hours, per job</text>

  <!-- Chart area: baseline y=540, scale 12px per £ -->
  <!-- £35 line: 540 - 420 = 120 -->
  <line x1="70" y1="120" x2="1130" y2="120" stroke="#e8a838" stroke-width="4" stroke-dasharray="14 10"/>
  <text x="1130" y="104" font-size="19" font-weight="700" fill="#b07c1d" text-anchor="end">£35 — the rate I believed I charged</text>

  <!-- Bars: 26.49→318, 26.30→316, 26.69→320 -->
  <g stroke="#111111" stroke-width="2">
    <rect x="150" y="222" width="200" height="318" fill="#ececec"/>
    <rect x="480" y="224" width="200" height="316" fill="#ececec"/>
    <rect x="810" y="220" width="200" height="320" fill="#ececec"/>
  </g>
  <text x="250"  y="200" font-size="22" font-weight="700" fill="#111111" text-anchor="middle">£26.49</text>
  <text x="580"  y="202" font-size="22" font-weight="700" fill="#111111" text-anchor="middle">£26.30</text>
  <text x="910"  y="198" font-size="22" font-weight="700" fill="#111111" text-anchor="middle">£26.69</text>

  <!-- Gap annotation -->
  <line x1="1070" y1="120" x2="1070" y2="220" stroke="#5b5b5b" stroke-width="2"/>
  <line x1="1058" y1="132" x2="1070" y2="120" stroke="#5b5b5b" stroke-width="2"/>
  <line x1="1082" y1="132" x2="1070" y2="120" stroke="#5b5b5b" stroke-width="2"/>
  <line x1="1058" y1="208" x2="1070" y2="220" stroke="#5b5b5b" stroke-width="2"/>
  <line x1="1082" y1="208" x2="1070" y2="220" stroke="#5b5b5b" stroke-width="2"/>
  <text x="1085" y="176" font-size="17" font-weight="700" fill="#111111">£9 an hour,</text>
  <text x="1085" y="198" font-size="17" fill="#5b5b5b">every hour</text>

  <!-- Baseline + labels -->
  <line x1="70" y1="540" x2="1130" y2="540" stroke="#111111" stroke-width="2"/>
  <text x="250" y="578" font-size="18" font-weight="600" fill="#111111" text-anchor="middle">Painted media wall</text>
  <text x="250" y="602" font-size="15" fill="#5b5b5b" text-anchor="middle">74 hours</text>
  <text x="580" y="578" font-size="18" font-weight="600" fill="#111111" text-anchor="middle">Fitted wardrobes</text>
  <text x="580" y="602" font-size="15" fill="#5b5b5b" text-anchor="middle">92 hours</text>
  <text x="910" y="578" font-size="18" font-weight="600" fill="#111111" text-anchor="middle">Shaker kitchen</text>
  <text x="910" y="602" font-size="15" fill="#5b5b5b" text-anchor="middle">178 hours</text>
</svg>
